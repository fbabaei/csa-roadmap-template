name: Validate Repository

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate-hosted:
    if: github.repository_owner != 'fbabaei_microsoft'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate markdown and portal structure
        run: python scripts/validate_repository.py

  validate-self-hosted:
    if: github.repository_owner == 'fbabaei_microsoft'
    runs-on: [self-hosted, linux]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate markdown and portal structure
        run: python scripts/validate_repository.py