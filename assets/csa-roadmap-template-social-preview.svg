<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">CSA Roadmap Template Social Preview</title>
  <desc id="desc">Prepared social preview artwork for the CSA Roadmap Template repository.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#093D3B" />
      <stop offset="55%" stop-color="#0F766E" />
      <stop offset="100%" stop-color="#C6772C" />
    </linearGradient>
  </defs>
